<header class="top">
    <div class="title-group">
        <div class="header-title">{{ header_title|default:"CajaPulso" }}</div>
        <div class="header-subtitle">{{ header_subtitle|default:"Sistema de control" }}</div>
    </div>

    <div class="top-actions">
        <a href="{% url 'notificaciones:inicio' %}"
            class="icon-btn icon-btn-link{% if active_module == 'notificaciones' %} active{% endif %}"
            data-notification-bell aria-label="Notificaciones">
            <i class="fa-solid fa-bell"></i>
            {% if app_notifications_unread_count %}
            <span class="notification-badge">{{ app_notifications_unread_display }}</span>
            {% endif %}
        </a>
        <div class="icon-btn" id="btn-configuracion">
            <i class="fa-solid fa-gear"></i>
        </div>

        {% include 'includes/header_dropdown.html' %}

        <div class="user-profile">
            <div class="u-avatar">
                {% if user.foto_perfil %}
                <img src="{{ user.foto_perfil.url }}" alt="Avatar"
                    style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;">
                {% else %}
                <i class="fa-solid fa-circle-user"></i>
                {% endif %}
            </div>
        </div>
    </div>
</header>
